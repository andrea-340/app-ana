<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Anastasia</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="/logo192.png">

    <script>
      // Sceglie il manifest in base all'indirizzo (Admin o Utente)
      const manifestLink = document.createElement('link');
      manifestLink.rel = 'manifest';
      manifestLink.href = window.location.pathname.includes('admin') ? '/manifest-admin.json' : '/manifest.json';
      document.head.appendChild(manifestLink);
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function (OneSignal) {
        await OneSignal.init({
          appId: "c5933b83-abe0-424b-9433-af3db6372d34",
          serviceWorkerPath: "OneSignalSDKWorker.js",
          allowLocalhostAsSecureOrigin: true,
          persistNotification: true,
          // DISATTIVA LA CAMPANELLA VIOLA
          notifyButton: {
            enable: false 
          },
          // ATTIVA IL BANNER DI CONSENSO (SLIDEDOWN) - Obbligatorio per iPhone
          promptOptions: {
            slidedown: {
              enabled: true,
              autoPrompt: true,
              timeDelay: 2,
              pageViews: 1,
              actionMessage: "Vuoi ricevere notifiche per i nuovi messaggi?",
              acceptButtonText: "ATTIVA",
              cancelButtonText: "NON ORA"
            }
          }
        });

        // Backup: se l'utente clicca un punto qualsiasi, riprova a chiedere il permesso
        document.addEventListener('click', function() {
          OneSignal.Notifications.requestPermission();
        }, { once: true });
      });
    </script>
</head>
<body class="bg-black text-white">
    <div id="root"></div>
</body>
</html>
