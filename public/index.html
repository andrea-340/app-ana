<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Anastasia</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="/logo192.png">

    <script>
      // Scelta del Manifest (Admin o Utente) in base all'URL
      const manifestLink = document.createElement('link');
      manifestLink.rel = 'manifest';
      manifestLink.href = window.location.pathname.includes('admin') ? '/manifest-admin.json' : '/manifest.json';
      document.head.appendChild(manifestLink);
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function (OneSignal) {
        await OneSignal.init({
          appId: "c5933b83-abe0-424b-9433-af3db6372d34",
          serviceWorkerPath: "OneSignalSDKWorker.js",
          allowLocalhostAsSecureOrigin: true,
          persistNotification: true,
          
          // 1. ELIMINA LA CAMPANELLA VIOLA
          notifyButton: {
            enable: false 
          },
          
          // 2. CONFIGURA IL POPUP AUTOMATICO (SLIDEDOWN)
          // Appare da solo senza tasti, così l'utente deve solo cliccare "Sì"
          promptOptions: {
            slidedown: {
              enabled: true,
              autoPrompt: true, // Appare da solo all'ingresso
              timeDelay: 2,     // Dopo 2 secondi
              pageViews: 1,
              actionMessage: "Vuoi ricevere notifiche per i nuovi messaggi?",
              acceptButtonText: "SÌ",
              cancelButtonText: "NO"
            }
          }
        });

        // 3. Backup invisibile: chiede il permesso al primo tocco sullo schermo
        // (Necessario se l'iPhone blocca l'auto-prompt)
        document.addEventListener('click', function() {
          OneSignal.Notifications.requestPermission();
        }, { once: true });
      });
    </script>
</head>
<body class="bg-black text-white">
    <div id="root"></div>
</body>
</html>
