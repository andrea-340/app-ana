<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Anastasia</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="/logo.ico">

    <script>
      // Scelta del Manifest (Admin vs Utente)
      const manifestLink = document.createElement('link');
      manifestLink.rel = 'manifest';
      manifestLink.href = window.location.pathname.includes('admin') ? '/manifest-admin.json' : '/manifest.json';
      document.head.appendChild(manifestLink);
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function (OneSignal) {
        await OneSignal.init({
          appId: "c5933b83-abe0-424b-9433-af3db6372d34",
          serviceWorkerPath: "OneSignalSDKWorker.js",
          allowLocalhostAsSecureOrigin: true,
          persistNotification: true,
          notifyButton: { enable: false },
          // Popup che appare dopo 1 secondo per catturare l'utente subito
          promptOptions: {
            slidedown: {
              enabled: true,
              autoPrompt: true,
              timeDelay: 1,
              actionMessage: "Ricevi una notifica quando Anastasia ti risponde.",
              acceptButtonText: "SÌ",
              cancelButtonText: "NO"
            }
          }
        });
      });

      // FUNZIONE "NUOVA CHAT" ANTI-BLOCCO TIKTOK
      // Questa funzione pulisce tutto e forza il browser di TikTok a rigenerare la sessione
      window.forceNewChat = function() {
        localStorage.clear();
        sessionStorage.clear();
        // Aggiungiamo un numero casuale all'URL per "fregare" il browser di TikTok
        const newUrl = window.location.origin + window.location.pathname + "?v=" + Math.random();
        window.location.replace(newUrl);
      };
    </script>
</head>
<body class="bg-black text-white">

    <script>
      if (/TikTok/i.test(navigator.userAgent)) {
        document.write(`
          <div id="tk-fix" style="position:fixed; top:0; left:0; width:100%; background:#222; color:#aaa; text-align:center; padding:5px; z-index:9999; font-size:10px;">
            Ottimizzato per TikTok • Per le notifiche audio usa Safari
          </div>
        `);
      }
    </script>

    <div id="root"></div>

</body>
</html>
