<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Anastasia</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="/logo192.png">

    <script>
      // 1. SCELTA DEL MANIFEST (Admin vs Utente)
      const manifestLink = document.createElement('link');
      manifestLink.rel = 'manifest';
      // Se l'URL contiene /admin carica il manifest-admin, altrimenti quello base
      manifestLink.href = window.location.pathname.includes('admin') ? '/manifest-admin.json' : '/manifest.json';
      document.head.appendChild(manifestLink);
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function (OneSignal) {
        await OneSignal.init({
          appId: "c5933b83-abe0-424b-9433-af3db6372d34",
          serviceWorkerPath: "OneSignalSDKWorker.js",
          allowLocalhostAsSecureOrigin: true,
          persistNotification: true,
          
          // NASCONDE LA CAMPANELLA VIOLA
          notifyButton: { enable: false },
          
          // POPUP AUTOMATICO (SLIDEDOWN) - Unico modo per iPhone
          promptOptions: {
            slidedown: {
              enabled: true,
              autoPrompt: true,
              timeDelay: 3,
              actionMessage: "Vuoi ricevere notifiche per i nuovi messaggi?",
              acceptButtonText: "SÌ",
              cancelButtonText: "NO"
            }
          }
        });

        // Backup: Chiede il permesso al primo tocco sullo schermo (necessario per iOS)
        document.addEventListener('click', () => {
          OneSignal.Notifications.requestPermission();
        }, { once: true });
      });
    </script>
</head>
<body class="bg-black text-white">

    <script>
      const isTikTok = /TikTok/i.test(navigator.userAgent) || /FBAN|FBAV/i.test(navigator.userAgent);
      if (isTikTok) {
        document.write(`
          <div style="position:fixed; top:0; left:0; width:100%; background:#9333ea; color:white; text-align:center; padding:12px; z-index:99999; font-size:13px; font-weight:bold; border-bottom: 2px solid white;">
            ⚠️ TikTok blocca le notifiche. Clicca i 3 puntini (⋯) in alto a destra e seleziona "Apri in Safari" per attivare la chat correttamente.
          </div>
          <div style="height:50px;"></div>
        `);
      }
    </script>

    <div id="root"></div>

</body>
</html>
