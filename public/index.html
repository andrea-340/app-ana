<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Anastasia la cartomante</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="/logo.ico" />
    <link rel="apple-touch-icon" href="/logo.ico" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap");
      body { font-family: "Poppins", sans-serif; -webkit-tap-highlight-color: transparent; }
      .magic-bg { background: radial-gradient(circle at top center, #2d1b4e 0%, #000000 90%); min-height: 100vh; }
    </style>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignal.js" async=""></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function (OneSignal) {
        await OneSignal.init({
          appId: "METTI_QUI_IL_TUO_CODICE_REALE", 
          notifyButton: {
            enable: true,
            size: 'medium',
            position: 'bottom-right',
            colors: { 'circle.background': '#9333ea' } // Colore viola come il tuo sito
          },
          allowLocalhostAsSecureOrigin: true,
        });
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
