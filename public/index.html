<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Anastasia la cartomante</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Anastasia">
    <link rel="icon" href="/logo.ico" />
    <link rel="apple-touch-icon" href="/logo.ico" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap");
      body { 
        font-family: "Poppins", sans-serif; 
        -webkit-tap-highlight-color: transparent; 
        background-color: black;
      }
      .magic-bg { 
        background: radial-gradient(circle at top center, #2d1b4e 0%, #000000 90%); 
        min-height: 100vh; 
      }
      /* Scrollbar viola sottile */
      .custom-scrollbar::-webkit-scrollbar { width: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #9333ea; border-radius: 10px; }
    </style>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function (OneSignal) {
        await OneSignal.init({
          appId: "c5933b83-abe0-424b-9433-af3db6372d34",
          allowLocalhostAsSecureOrigin: true,
          
          // Configurazione specifica per evitare blocchi iPhone
          persistNotification: true, 
          serviceWorkerPath: "OneSignalSDKWorker.js",
          
          // Il campanellino viola (indispensabile su iOS)
          notifyButton: {
            enable: true,
            size: 'medium',
            position: 'bottom-right',
            colors: { 'circle.background': '#9333ea' },
            text: { 'tip.state.unsubscribed': 'Attiva notifiche' }
          },

          // Il banner che scende dall'alto (Prompt)
          promptOptions: {
            slidedown: {
              enabled: true,
              autoPrompt: true,
              timeDelay: 3,
              pageViews: 1,
              actionMessage: "Ricevi una notifica quando Anastasia ti risponde.",
              acceptButtonText: "ATTIVA",
              cancelButtonText: "NON ORA"
            }
          }
        });
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
